<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Platy - Your Digital Agent for Smarter Work in Motorsports and Live Events">
  <meta name="theme-color" content="#24A2A7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="canonical" href="https://platypro.com/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/style.css">

  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="manifest" href="manifest.json">

  <title>Platy — Your Digital Agent for Smarter Work</title>
</head>
<body>
  <div id="app" class="app-shell">
    <header id="app-header" class="app-header">
      <div class="header-left">
        <button id="menu-toggle" class="icon-btn" aria-label="Toggle menu">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <a href="#/dashboard" class="logo-link" data-nav>
          <div class="logo-icon">
            <span class="material-symbols-outlined">bolt</span>
          </div>
          <span class="logo-text">Platy</span>
        </a>
      </div>
      <div class="header-center">
        <div class="search-bar">
          <span class="material-symbols-outlined search-icon">search</span>
          <input type="text" class="search-input" placeholder="Search jobs, events, people...">
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn" aria-label="Notifications">
          <span class="material-symbols-outlined">notifications</span>
          <span class="badge">3</span>
        </button>
        <button class="icon-btn" aria-label="Messages">
          <span class="material-symbols-outlined">chat</span>
          <span class="badge">1</span>
        </button>
        <div class="avatar-btn" id="avatar-btn">
          <div class="avatar">JD</div>
        </div>
      </div>
    </header>

    <aside id="sidebar" class="sidebar">
      <nav class="sidebar-nav">
        <a href="#/dashboard" class="nav-item active" data-nav>
          <span class="material-symbols-outlined">dashboard</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="#/jobs" class="nav-item" data-nav>
          <span class="material-symbols-outlined">work</span>
          <span class="nav-label">Jobs</span>
        </a>
        <a href="#/events" class="nav-item" data-nav>
          <span class="material-symbols-outlined">event</span>
          <span class="nav-label">Events</span>
        </a>
        <a href="#/team" class="nav-item" data-nav>
          <span class="material-symbols-outlined">groups</span>
          <span class="nav-label">Team</span>
        </a>
        <a href="#/messages" class="nav-item" data-nav>
          <span class="material-symbols-outlined">chat</span>
          <span class="nav-label">Messages</span>
        </a>
        <a href="#/finance" class="nav-item" data-nav>
          <span class="material-symbols-outlined">payments</span>
          <span class="nav-label">Finance</span>
        </a>
        <a href="#/travel" class="nav-item" data-nav>
          <span class="material-symbols-outlined">flight</span>
          <span class="nav-label">Travel</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="#/settings" class="nav-item" data-nav>
          <span class="material-symbols-outlined">settings</span>
          <span class="nav-label">Settings</span>
        </a>
        <a href="#/help" class="nav-item" data-nav>
          <span class="material-symbols-outlined">help</span>
          <span class="nav-label">Help</span>
        </a>
        <a href="#" class="nav-item" id="logout-btn" style="color: var(--error);">
          <span class="material-symbols-outlined">logout</span>
          <span class="nav-label">Déconnexion</span>
        </a>
      </div>
    </aside>

    <main id="main-content" class="main-content">
      <div id="page-content" class="page-content"></div>
    </main>

    <nav id="mobile-bottom-nav" class="mobile-bottom-nav">
      <a href="#/dashboard" class="bottom-nav-item active" data-nav>
        <span class="material-symbols-outlined">dashboard</span>
        <span class="bottom-nav-label">Home</span>
      </a>
      <a href="#/jobs" class="bottom-nav-item" data-nav>
        <span class="material-symbols-outlined">work</span>
        <span class="bottom-nav-label">Jobs</span>
      </a>
      <a href="#/events" class="bottom-nav-item" data-nav>
        <span class="material-symbols-outlined">event</span>
        <span class="bottom-nav-label">Events</span>
      </a>
      <a href="#/messages" class="bottom-nav-item" data-nav>
        <span class="material-symbols-outlined">chat</span>
        <span class="bottom-nav-label">Chat</span>
      </a>
      <a href="#/profile" class="bottom-nav-item" data-nav>
        <span class="material-symbols-outlined">person</span>
        <span class="bottom-nav-label">Profile</span>
      </a>
    </nav>
  </div>

  <script src="js/router.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
